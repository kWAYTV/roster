name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run check

      - name: Type-check and build
        run: npm run build

  publish:
    needs: [backend, frontend]
    runs-on: windows-latest
    environment: roster
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx changelogithub

      - name: Prepare signing key
        id: signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '\n\r')"
          if ! printf '%s' "$key" | base64 -d >/dev/null 2>&1; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not valid base64."
            exit 1
          fi
          keyfile="$RUNNER_TEMP/roster.key"
          printf '%s' "$key" > "$keyfile"
          echo "keyfile=$keyfile" >> "$GITHUB_OUTPUT"

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing.outputs.keyfile }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Roster ${{ github.ref_name }}
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ""
