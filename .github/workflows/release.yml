name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run check

      - name: Type-check and build
        run: npm run build

  release-please:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    environment: roster
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      # release-please bumps Cargo.toml but not Cargo.lock; cargo self-heals on build.
      - name: Sync Cargo.lock
        working-directory: src-tauri
        run: cargo update -p roster

      - name: Prepare signing key
        id: signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | tr -d '\n\r')"
          if ! printf '%s' "$key" | base64 -d >/dev/null 2>&1; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not valid base64."
            exit 1
          fi
          keyfile="$RUNNER_TEMP/roster.key"
          printf '%s' "$key" > "$keyfile"
          echo "keyfile=$keyfile" >> "$GITHUB_OUTPUT"

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ steps.signing.outputs.keyfile }}
        with:
          tagName: ${{ needs.release-please.outputs.tag_name }}
          releaseName: Roster ${{ needs.release-please.outputs.tag_name }}
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ""
