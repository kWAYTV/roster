name: Release

on:
  push:
    branches: [main, kway]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run tauri build

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          installer=$(find src-tauri/target/release/bundle/nsis -name '*-setup.exe' | head -n1)
          if [ -z "$installer" ]; then
            echo "No NSIS installer produced." >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Versioned release from a v* tag.
            tag="$GITHUB_REF_NAME"
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release upload "$tag" "$installer" --clobber
            else
              gh release create "$tag" "$installer" --title "$tag" --generate-notes
            fi
          else
            # Rolling pre-release that always tracks the newest push.
            gh release delete latest --yes --cleanup-tag || true
            gh release create latest "$installer" \
              --title "Latest build" \
              --prerelease \
              --target "$GITHUB_SHA" \
              --notes "Automated build of \`${GITHUB_SHA::7}\` from \`$GITHUB_REF_NAME\`."
          fi
