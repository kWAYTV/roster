name: Release

on:
  push:
    branches: [main, kway]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    environment: roster
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Set release metadata
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "release_name=Roster ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Latest build" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove rolling latest release
        if: steps.release.outputs.tag_name == 'latest'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Prepare signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$RUNNER_TEMP/roster.key"

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ runner.temp }}/roster.key
        with:
          tagName: ${{ steps.release.outputs.tag_name }}
          releaseName: ${{ steps.release.outputs.release_name }}
          releaseBody: "Signed Windows installer and updater manifest."
          prerelease: ${{ steps.release.outputs.prerelease }}
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ""
